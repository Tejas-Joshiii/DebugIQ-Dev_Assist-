  <text x="124" y="181" font-family="Arial, sans-serif" font-size="19" font-weight="900" fill="#050505">Debug My Code</text>
  <text x="377" y="181" font-family="Arial, sans-serif" font-size="19" font-weight="900" fill="#f7f4ed">Teach LeetCode</text>
  <text x="653" y="181" font-family="Arial, sans-serif" font-size="19" font-weight="900" fill="#f7f4ed">FullStack</text>
  <text x="948" y="181" font-family="Arial, sans-serif" font-size="19" font-weight="900" fill="#f7f4ed">ML Debugger</text>
  <rect x="56" y="204" width="544" height="330" fill="#0a0a0a" stroke="#3a3a3a"/>
  <rect x="56" y="204" width="544" height="126" fill="#0a0a0a" stroke="#3a3a3a"/>
  <text x="86" y="248" font-family="Arial, sans-serif" font-size="23" font-weight="900" fill="#f7f4ed">Problem statement</text>
  <rect x="86" y="270" width="484" height="36" fill="#111111" stroke="#565656"/>
  <text x="104" y="294" font-family="Arial, sans-serif" font-size="15" fill="#c9c9c3">Find two numbers whose sum equals target</text>
  <rect x="56" y="330" width="272" height="204" fill="#df8bd1" stroke="#3a3a3a"/>
  <text x="86" y="374" font-family="Arial, sans-serif" font-size="23" font-weight="900" fill="#050505">Broken code</text>
  <rect x="86" y="396" width="212" height="100" fill="#f7f4ed" stroke="#050505" stroke-width="3"/>
  <text x="104" y="425" font-family="Menlo, monospace" font-size="14" fill="#050505">for i in nums:</text>
  <text x="104" y="452" font-family="Menlo, monospace" font-size="14" fill="#050505">  if i + j == target:</text>
  <text x="104" y="479" font-family="Menlo, monospace" font-size="14" fill="#050505">    return i, j</text>
  <rect x="328" y="330" width="272" height="204" fill="#0a0a0a" stroke="#3a3a3a"/>
  <text x="358" y="374" font-family="Arial, sans-serif" font-size="23" font-weight="900" fill="#f7f4ed">Working code</text>
  <rect x="358" y="396" width="212" height="100" fill="#111111" stroke="#565656"/>
  <text x="376" y="425" font-family="Menlo, monospace" font-size="14" fill="#f7f4ed">seen = {}</text>
  <text x="376" y="452" font-family="Menlo, monospace" font-size="14" fill="#f7f4ed">for i, x in enumerate(nums):</text>
  <text x="376" y="479" font-family="Menlo, monospace" font-size="14" fill="#f7f4ed">  ...</text>
  <rect x="600" y="204" width="544" height="86" fill="#4ea77f" stroke="#3a3a3a"/>
  <text x="632" y="258" font-family="Arial, sans-serif" font-size="42" font-weight="900" fill="#050505">Results</text>
  <rect x="600" y="290" width="272" height="244" fill="#f2f542" stroke="#3a3a3a"/>
  <text x="630" y="335" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="#050505">Visual Explanation</text>
  <rect x="635" y="372" width="48" height="54" fill="#f7f4ed" stroke="#050505" stroke-width="3"/>
  <rect x="695" y="372" width="48" height="54" fill="#ed6c2f" stroke="#050505" stroke-width="3"/>
  <rect x="755" y="372" width="48" height="54" fill="#f7f4ed" stroke="#050505" stroke-width="3"/>
  <text x="650" y="406" font-family="Arial" font-size="20" font-weight="900" fill="#050505">2</text>
  <text x="710" y="406" font-family="Arial" font-size="20" font-weight="900" fill="#050505">7</text>
  <text x="770" y="406" font-family="Arial" font-size="20" font-weight="900" fill="#050505">11</text>
  <text x="695" y="468" font-family="Arial" font-size="17" font-weight="900" fill="#050505">finger i</text>
  <text x="632" y="506" font-family="Arial" font-size="18" fill="#050505">Compare boxes, then move pointer.</text>
  <rect x="872" y="290" width="272" height="244" fill="#ed6c2f" stroke="#3a3a3a"/>
  <text x="902" y="335" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="#050505">Fix</text>
  <text x="902" y="382" font-family="Arial" font-size="18" fill="#050505">Use index loop.</text>
  <text x="902" y="421" font-family="Arial" font-size="18" fill="#050505">Store previous values.</text>
  <text x="902" y="460" font-family="Arial" font-size="18" fill="#050505">Return indices, not values.</text>
  <rect x="56" y="558" width="1088" height="82" fill="#f2f542" stroke="#3a3a3a"/>
  <text x="484" y="609" font-family="Arial" font-size="24" font-weight="900" fill="#050505">Analyze</text>
</svg>
