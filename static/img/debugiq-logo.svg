  <path d="m210 90 22 38-22 38" fill="none" stroke="#8df7df" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>

  <path d="M75 70h45c39 0 66 24 66 58s-27 58-66 58H75V70Z" fill="#061418" stroke="#21454b" stroke-width="2"/>
  <path d="M99 94v68h21c23 0 38-13 38-34s-15-34-38-34H99Z" fill="url(#aqua)" filter="url(#glow)"/>
  <path d="M157 158 190 191" fill="none" stroke="url(#aqua)" stroke-width="13" stroke-linecap="round" filter="url(#glow)"/>

